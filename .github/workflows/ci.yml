name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run validate
      # Manifest-rule conformance against the shared corpus in cortex-registry —
      # keeps this validator in lockstep with the registry's and cortex-app's.
      - run: npm run conformance
